  <body>
    <div id="root">
      <!-- Pre-React Splash Screen (removed once React mounts) -->
      <div id="pre-splash" style="position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:hsl(240 10% 3.9%);transition:opacity 0.4s ease-out;">
        <img src="/icons/icon-192.png" alt="ScrollLibrary" style="height:80px;width:auto;animation:pulse 2s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(212,175,55,0.3));" />
        <div style="width:120px;height:3px;background:rgba(255,255,255,0.1);border-radius:99px;margin-top:24px;overflow:hidden;">
          <div style="width:100%;height:100%;background:linear-gradient(90deg,transparent,hsl(43 74% 49%),transparent);animation:shimmer 1.2s ease-in-out infinite;"></div>
        </div>
        <p style="color:rgba(255,255,255,0.5);font-size:12px;margin-top:16px;font-family:system-ui,sans-serif;">Cognitive Mastery Certification Platform</p>
      </div>
      <style>
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.8;transform:scale(0.98)} }
        @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove pre-splash once React mounts (not on DOMContentLoaded which fires too early)
      window.__removeSplash = function() {
        var splash = document.getElementById('pre-splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(function() { splash.remove(); }, 400);
        }
      };
      // Fallback: remove after 8s if React never mounts (prevents permanent blank screen)
      setTimeout(function() { window.__removeSplash && window.__removeSplash(); }, 8000);
    </script>
  </body>
</html>
