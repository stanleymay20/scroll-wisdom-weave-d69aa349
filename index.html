<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ScrollLibrary™ - AI-Powered Digital Publishing & Learning Platform</title>
    <meta name="description" content="AI-powered digital publishing and learning platform for generating, reading, and interacting with books — including academic texts, professional manuals, workbooks, comics, and guided learning content." />
    <meta name="author" content="ScrollLibrary" />
    <meta name="keywords" content="AI publishing platform, digital book generation, academic text generator, educational technology, learning platform, AI-powered education, book publishing, workbook generator, digital learning" />
    
    <!-- Schema.org Educational Platform Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ScrollLibrary",
      "applicationCategory": "EducationalApplication",
      "applicationSubCategory": "Digital Publishing Platform",
      "description": "AI-powered digital publishing and learning platform for generating, reading, and interacting with books including academic texts, workbooks, comics, and guided learning content.",
      "operatingSystem": "Web, iOS, Android",
      "url": "https://scrolllibrary.com",
      "author": {
        "@type": "Organization",
        "name": "ScrollLibrary"
      },
      "offers": {
        "@type": "Offer",
        "category": "Education",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Academic book generation with citations",
        "Professional manual creation",
        "Workbook and guided learning content",
        "Comic and illustrated book generation",
        "Deep research mode for scholarly work",
        "Multi-language support",
        "PDF and EPUB export"
      ],
      "audience": {
        "@type": "EducationalAudience",
        "educationalRole": ["student", "teacher", "researcher", "professional"]
      }
    }
    </script>
    
    <!-- Favicon - Cross-platform support -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />
    
    <!-- Apple/iOS Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#1e293b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    
    <!-- Apple PWA Configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ScrollLibrary" />
    
    <!-- Android/Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="ScrollLibrary" />
    
    <!-- Windows -->
    <meta name="msapplication-TileColor" content="#1e293b" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />
    <meta name="msapplication-config" content="none" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- Mobile Optimization -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="HandheldFriendly" content="true" />

    <!-- Open Graph -->
    <meta property="og:title" content="ScrollLibrary™ - AI-Powered Digital Publishing & Learning Platform" />
    <meta property="og:description" content="Generate, publish, and study books with structured AI — from academic texts to comics and guided learning experiences." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://scroll-wisdom-weave.lovable.app/og-image.png" />
    <meta property="og:site_name" content="ScrollLibrary" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ScrollLibrary" />
    <meta name="twitter:title" content="ScrollLibrary™ - AI-Powered Digital Publishing & Learning Platform" />
    <meta name="twitter:description" content="Generate, publish, and study books with structured AI — from academic texts to comics and guided learning experiences." />
    <meta name="twitter:image" content="https://scroll-wisdom-weave.lovable.app/og-image.png" />
  </head>

  <body>
    <div id="root">
      <!-- Pre-React Splash Screen (removed once React mounts) -->
      <div id="pre-splash" style="
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: hsl(240 10% 3.9%);
        transition: opacity 0.4s ease-out;
      ">
        <img 
          src="/icons/icon-192.png" 
          alt="ScrollLibrary" 
          style="
            height: 80px;
            width: auto;
            animation: pulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
          "
        />
        <div style="
          width: 120px;
          height: 3px;
          background: rgba(255,255,255,0.1);
          border-radius: 99px;
          margin-top: 24px;
          overflow: hidden;
        ">
          <div style="
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, hsl(43 74% 49%), transparent);
            animation: shimmer 1.2s ease-in-out infinite;
          "></div>
        </div>
        <p style="
          color: rgba(255,255,255,0.5);
          font-size: 12px;
          margin-top: 16px;
          font-family: system-ui, sans-serif;
        ">AI-Powered Knowledge Platform</p>
      </div>
      <style>
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.8; transform: scale(0.98); }
        }
        @keyframes shimmer {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(100%); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove pre-splash once React mounts
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          var splash = document.getElementById('pre-splash');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(function() { splash.remove(); }, 400);
          }
        }, 100);
      });
    </script>
  </body>
</html>
