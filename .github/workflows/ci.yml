name: CI
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Show dependency manifest versions
        run: |
          node -e "const p=require('./package.json'); console.log('@lovable.dev/cloud-auth-js=', p.dependencies['@lovable.dev/cloud-auth-js']); console.log('@radix-ui/react-visually-hidden=', p.dependencies['@radix-ui/react-visually-hidden']); console.log('workbox-window=', p.dependencies['workbox-window']);"
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run quality gates
        run: npm run ci
